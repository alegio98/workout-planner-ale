<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Gestisci la tua scheda palestra e pianifica gli allenamenti." />
    <script>
      try {
        const savedTheme = localStorage.getItem('workout-planner.theme')
        const theme = savedTheme === 'light' || savedTheme === 'dark'
          ? savedTheme
          : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
        document.querySelector('meta[name="theme-color"]').content = theme === 'dark' ? '#09070d' : '#7c3aed'
      } catch {}
    </script>
    <title>Workout Planner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
