name: Pubblica Workout Planner

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Crea build
        run: npm run build

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Carica build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
